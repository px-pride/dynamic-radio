[project]
name = "dynamic-radio"
version = "0.1.0"
description = "24/7 automated DJ service — contextual music via Tidal, plans generated by Axi"
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "aiohttp>=3.9.0",
    "musicbrainzngs>=0.7.1",
    "tidalapi>=0.8.0",
]

[tool.uv]
package = true

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "mcp>=1.26.0",
    "pytest>=9.0.2",
    "pytest-aiohttp>=1.1.0",
    "pytest-asyncio>=1.3.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/dynamic_radio"]

[project.scripts]
dynamic-radio = "dynamic_radio.main:main"
